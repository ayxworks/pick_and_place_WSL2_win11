services:
  pick_and_place:
    build:
      context: .
      dockerfile: Dockerfile
    image: pick_and_place
    container_name: pick_and_place
    network_mode: host
    stdin_open: true
    tty: true
    privileged: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    devices:
      - /dev/bus/usb:/dev/bus/usb
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=72
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - USE_SIM=${USE_SIM:-false}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev:/dev
    command: >
      bash -c "
      source /opt/ros/humble/setup.bash &&
      source /ros2_ws/install/setup.bash &&
      ros2 launch pick_and_place pick_and_place.launch.py use_sim:=$$USE_SIM
      "